[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ember-qc-analysis"
version = "0.10.9"
description = "Post-benchmark analysis, plots, and statistics for ember-qc results"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.9"
authors = [
    {name = "Zach Macaskill-Smith", email = "zachary.n.macaskill-smith@vanderbilt.edu"},
]
keywords = [
    "quantum",
    "minor-embedding",
    "benchmarking",
    "d-wave",
    "quantum-annealing",
    "graph-embedding",
    "analysis",
    "visualization",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Physics",
    "Operating System :: OS Independent",
]

dependencies = [
    "numpy>=1.20.0",
    "pandas>=1.3.0",
    "matplotlib>=3.4.0",
    "seaborn>=0.11.0",
    "scipy>=1.7.0",
    "networkx>=2.6.0",
    "platformdirs>=3.0.0",
]

[project.urls]
Homepage = "https://github.com/zachmacsmith/ember"
Repository = "https://github.com/zachmacsmith/ember"
"Bug Tracker" = "https://github.com/zachmacsmith/ember/issues"

[project.scripts]
ember-analysis = "ember_qc_analysis.cli:main"
ember-a = "ember_qc_analysis.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/ember_qc_analysis"]

[tool.hatch.build.targets.sdist]
include = [
    "src/",
    "LICENSE",
    "README.md",
    "CHANGELOG.md",
]
