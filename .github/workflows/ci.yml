name: Tests

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ember-qc
        run: pip install -e "packages/ember-qc/[dev]"

      - name: Run tests
        run: |
          pytest tests/ \
            --ignore=tests/test_qeanalysis.py \
            -v
